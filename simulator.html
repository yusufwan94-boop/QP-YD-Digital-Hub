<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project QP-YD: Quantum Master Lab</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --neon: #22d3ee; --gold: #fbbf24; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        /* UI Elements */
        .lang-toggle { position: fixed; top: 10px; right: 10px; padding: 8px 16px; background: var(--gold); border: none; border-radius: 20px; font-weight: bold; cursor: pointer; z-index: 1000; }
        h2 { margin-top: 45px; font-size: 1.4rem; text-align: center; color: var(--neon); }
        
        .container { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 1100px; }
        
        /* Control Panel */
        .box { background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .meter-group { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 15px; }
        .meter-box { flex: 1; text-align: center; }
        .meter { background: #000; color: var(--neon); border: 2px solid #475569; padding: 10px 2px; font-family: monospace; font-size: 1.1rem; border-radius: 6px; margin-bottom: 4px; }
        .label { font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; }
        
        .led-stage { height: 70px; background: #020617; border-radius: 10px; margin: 10px 0; display: flex; align-items: center; justify-content: center; border: 1px solid #334155; }
        .led { width: 30px; height: 30px; border-radius: 50% 50% 15% 15%; transition: 0.2s; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .btn { padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 0.8rem; cursor: pointer; active { transform: scale(0.95); } }
        
        input[type=range] { width: 100%; height: 35px; cursor: pointer; accent-color: var(--gold); }
        
        /* Chart Area */
        #chart-box { background: white; border-radius: 15px; padding: 10px; height: 350px; position: relative; }
        
        .analysis-card { background: #020617; padding: 12px; border-radius: 8px; margin-top: 15px; border-left: 4px solid var(--gold); font-size: 0.85rem; line-height: 1.4; }
        .conclusion-box { background: var(--card); padding: 15px; border-radius: 15px; margin-top: 15px; width: 100%; box-sizing: border-box; border: 1px solid #334155; font-size: 0.9rem; }

        /* Desktop Optimization */
        @media (min-width: 850px) {
            .container { flex-direction: row; align-items: stretch; }
            .box { width: 380px; }
            #chart-box { flex: 1; height: auto; min-height: 500px; }
            h2 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <button class="lang-toggle" onclick="toggleLang()" id="langBtn">BM/EN</button>
    <h2 id="title">Project QP-YD: Quantum Master Lab</h2>

    <div class="container">
        <div class="box">
            <div class="meter-group">
                <div class="meter-box"><div class="meter" style="color:#fff">9.00</div><div class="label" id="m1">Source</div></div>
                <div class="meter-box"><div class="meter" id="v-led" style="color:var(--gold)">0.00</div><div class="label" id="m2">LED V</div></div>
                <div class="meter-box"><div class="meter" id="v-out">0.00</div><div class="label" id="m3">Solar Vo</div></div>
            </div>

            <div class="led-stage"><div id="main-led" class="led" style="background: #111;"></div></div>

            <div class="btn-grid">
                <button class="btn" style="background:#7c3aed" onclick="selectLED('UV', 395, 3.6, '#a855f7')">UV</button>
                <button class="btn" style="background:#2563eb" onclick="selectLED('Blue', 465, 3.2, '#3b82f6')">BLUE</button>
                <button class="btn" style="background:#16a34a" onclick="selectLED('Green', 525, 2.2, '#22c55e')">GREEN</button>
                <button class="btn" style="background:#dc2626" onclick="selectLED('Red', 660, 1.8, '#ef4444')">RED</button>
                <button class="btn" style="background:#4c1d95; grid-column: span 2;" onclick="selectLED('IR', 940, 1.2, '#7c3aed')">INFRARED</button>
            </div>

            <input type="range" id="pot" min="0" max="1000" value="0" oninput="update()">
            <button onclick="logData()" id="logBtn" style="width:100%; padding:15px; background:#0d9488; color:white; border:none; border-radius:8px; font-weight:bold; margin-top:10px;">LOG DATA</button>
            
            <div id="analysis" class="analysis-card">Select an LED to begin / Pilih LED untuk bermula.</div>
        </div>

        <div id="chart-box"><canvas id="planckChart"></canvas></div>
    </div>

    <div class="conclusion-box">
        <strong id="conc-h">Results / Keputusan:</strong>
        <p id="final-result" style="margin: 5px 0 0 0;">Log points to calculate h...</p>
    </div>

    <script>
        let currentLang = 'en';
        const dict = {
            en: { title: "Project QP-YD: Quantum Lab", m1: "Source", m2: "LED V", m3: "Solar Vo", log: "LOG SATURATION POINT", h: "Result: h =", err: "Error:" },
            ms: { title: "Projek QP-YD: Makmal Kuantum", m1: "Punca", m2: "V LED", m3: "Solar Vo", log: "REKOD TITIK TEPU", h: "Keputusan: h =", err: "Ralat:" }
        };

        let currentLED = { name: 'None', wave: 0, vf: 0, color: '#111' };
        let points = [];

        // Initialize Chart
        const ctx = document.getElementById('planckChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'scatter',
            data: {
                datasets: [
                    { label: 'Data', data: [], pointBackgroundColor: [], pointRadius: 9, z: 2 },
                    { label: 'Line', data: [], type: 'line', borderColor: '#475569', borderDash: [5, 5], pointRadius: 0, z: 1 }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: {
                    x: { type: 'linear', min: 0, max: 9, title: { display: true, text: 'f (10^14 Hz)' } },
                    y: { type: 'linear', min: -1.5, max: 2.5, title: { display: true, text: 'Vo (V)' } }
                },
                plugins: { legend: { display: false } }
            }
        });

        function toggleLang() {
            currentLang = (currentLang === 'en' ? 'ms' : 'en');
            let d = dict[currentLang];
            document.getElementById('title').innerText = d.title;
            document.getElementById('m1').innerText = d.m1;
            document.getElementById('m2').innerText = d.m2;
            document.getElementById('m3').innerText = d.m3;
            document.getElementById('logBtn').innerText = d.log;
            updateChart();
        }

        function selectLED(name, wave, vf, color) {
            currentLED = { name, wave, vf, color };
            document.getElementById('pot').value = 0;
            update();
        }

        function update() {
            if (currentLED.name === 'None') return;
            let val = document.getElementById('pot').value / 1000;
            let freq = 3e17 / currentLED.wave;
            let maxVo = (6.626e-34 * freq / 1.602e-19) - 0.98;
            let vo = val > 0.01 ? maxVo * (1 - Math.exp(-val * 8)) : 0;
            
            document.getElementById('v-led').innerText = (val > 0.01 ? currentLED.vf : 0).toFixed(2);
            document.getElementById('v-out').innerText = vo.toFixed(2);
            document.getElementById('main-led').style.background = val > 0.01 ? currentLED.color : '#111';
            document.getElementById('main-led').style.boxShadow = val > 0.01 ? `0 0 ${val*50}px ${currentLED.color}` : 'none';
        }

        function logData() {
            if (currentLED.name === 'None') return;
            let f = (3e17 / currentLED.wave) / 1e14;
            let vo = parseFloat(document.getElementById('v-out').innerText);
            if (vo < 0.1) return;
            points = points.filter(p => Math.abs(p.x - f) > 0.1);
            points.push({ x: f, y: vo, color: currentLED.color });
            updateChart();
        }

        function updateChart() {
            chart.data.datasets[0].data = points;
            chart.data.datasets[0].pointBackgroundColor = points.map(p => p.color);
            
            if (points.length >= 2) {
                let n = points.length, sx = 0, sy = 0, sxy = 0, sx2 = 0;
                points.forEach(p => { sx += p.x; sy += p.y; sxy += p.x * p.y; sx2 += p.x * p.x; });
                let m = (n * sxy - sx * sy) / (n * sx2 - sx * sx);
                let c = (sy - m * sx) / n;
                
                chart.data.datasets[1].data = [{ x: 0, y: c }, { x: 9, y: m * 9 + c }];
                
                let h = (m * 1.602e-33); 
                let f0 = Math.abs(c/m);
                let err = Math.abs((h - 6.626e-34)/6.626e-34 * 100);
                
                document.getElementById('analysis').innerHTML = `Slope: ${m.toFixed(3)} | fo: ${f0.toFixed(2)} | W: ${Math.abs(c).toFixed(2)}eV`;
                document.getElementById('final-result').innerHTML = `${dict[currentLang].h} <b>${h.toExponential(2)}</b> J·s (${dict[currentLang].err} ${err.toFixed(1)}%)`;
            }
            chart.update();
        }
    </script>
</body>
</html>
