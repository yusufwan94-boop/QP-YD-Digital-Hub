<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Physics Labs | QP-YD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;700;900&display=swap');
        
        body { background: #020617; color: white; margin: 0; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .tab-content { display: none; width: 100%; animation: fadeIn 0.4s ease-out; }
        .tab-content.active { display: block; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .nav-hub { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); position: sticky; top: 0; z-index: 9999; }
        .nav-btn { padding: 15px 25px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; font-size: 0.75rem; transition: 0.3s; border-bottom: 3px solid transparent; }
        .nav-btn.active { color: #3b82f6; border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        
        .meter-box { background: #000; border: 2px solid #1e293b; border-radius: 12px; padding: 10px; text-align: center; }
        .meter-val { font-family: 'JetBrains Mono', monospace; font-size: 1.25rem; font-weight: 700; color: #22d3ee; }
        .led-indicator { width: 40px; height: 40px; border-radius: 50% 50% 15% 15%; margin: 0 auto; transition: 0.2s; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .glass { background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        
        input[type=range] { -webkit-appearance: none; width: 100%; background: #1e293b; height: 10px; border-radius: 10px; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 24px; height: 24px; background: #fbbf24; border-radius: 50%; cursor: pointer; border: 3px solid #000; }
        
        .active-led { filter: drop-shadow(0 0 20px var(--glow-color)) brightness(1.5); }
    </style>
</head>
<body class="pb-10">

    <nav class="nav-hub flex justify-center gap-4">
        <button class="nav-btn active" id="btn-nav-1" onclick="showLab(1)">Lab 1: Saturation</button>
        <button class="nav-btn" id="btn-nav-2" onclick="showLab(2)">Lab 2: Activation</button>
    </nav>

    <div id="lab1" class="tab-content active p-4 md:p-8">
        <div class="max-w-7xl mx-auto">
            <nav class="mb-6 flex justify-end">
                <button onclick="toggleLang1()" class="px-4 py-2 rounded-xl bg-slate-800 border border-slate-700 text-xs font-black hover:bg-slate-700 uppercase tracking-widest">BM / EN</button>
            </nav>
            <header class="mb-10">
                <h1 class="text-5xl font-black tracking-tighter text-blue-500 uppercase"><span id="title1-p1">SATURATION</span> <span class="text-white" id="title1-p2">VOLTAGE</span></h1>
                <p class="text-slate-400 font-bold tracking-[0.2em] mt-2 text-sm" id="subtitle1">METHOD: Vo = (h/e)f - Φ/e</p>
            </header>
            <div class="grid lg:grid-cols-12 gap-6">
                <div class="lg:col-span-4 space-y-6">
                    <div class="glass p-6 rounded-[2rem] border-l-4 border-blue-500">
                        <div class="grid grid-cols-2 gap-3 mb-6">
                            <div class="meter-box"><div class="meter-val" id="v-in-1">0.00</div><div class="text-[9px] text-slate-500 font-black uppercase mt-1" id="m1_1">Source Vin</div></div>
                            <div class="meter-box"><div class="meter-val" id="v-out-1" style="color: #fbbf24;">0.00</div><div class="text-[9px] text-slate-500 font-black uppercase mt-1" id="m3_1">Solar Vo</div></div>
                        </div>
                        <div class="h-40 bg-black/50 rounded-2xl border border-slate-800 mb-6"><canvas id="liveryChart1"></canvas></div>
                        <div class="h-20 bg-black/80 rounded-2xl flex items-center justify-center border border-slate-800 mb-6"><div id="led-bulb-1" class="led-indicator" style="background: #111;"></div></div>
                        <div class="grid grid-cols-2 gap-2 mb-6">
                            <button class="py-3 rounded-lg bg-purple-600 font-black text-[10px] uppercase" onclick="selectLED1('UV', 395, '#a855f7')">UV</button>
                            <button class="py-3 rounded-lg bg-blue-600 font-black text-[10px] uppercase" onclick="selectLED1('Blue', 465, '#3b82f6')">Blue</button>
                            <button class="py-3 rounded-lg bg-green-600 font-black text-[10px] uppercase" onclick="selectLED1('Green', 525, '#22c55e')">Green</button>
                            <button class="py-3 rounded-lg bg-red-600 font-black text-[10px] uppercase" onclick="selectLED1('Red', 660, '#ef4444')">Red</button>
                        </div>
                        <div class="space-y-4">
                            <div class="flex justify-between font-black text-[10px] text-slate-500 uppercase px-1"><span id="adj-lbl-1">Adjust Brightness</span><span id="perc-1">0%</span></div>
                            <input type="range" id="pot1" min="0" max="1000" value="0" oninput="runPhysics1()">
                        </div>
                        <div class="flex gap-2 mt-6">
                            <button onclick="logData1()" id="logBtn1" class="flex-grow py-4 bg-emerald-600 rounded-xl font-black uppercase text-xs tracking-widest">Capture Vo</button>
                            <button onclick="resetLab1()" class="px-4 border-2 border-red-900/50 text-red-500 rounded-xl font-black">✕</button>
                        </div>
                    </div>
                </div>
                <div class="lg:col-span-8 space-y-6">
                    <div class="glass p-6 rounded-[2rem] h-[450px] relative"><canvas id="planckChart1"></canvas></div>
                    <div class="bg-slate-900/80 p-6 rounded-2xl border border-slate-800 border-l-4 border-amber-500">
                        <strong id="conc-h1" class="text-amber-400 uppercase tracking-widest text-[10px]">Results / Keputusan:</strong>
                        <p id="final-result1" class="mt-2 text-xl font-black mono text-emerald-400">Ready for data input...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="lab2" class="tab-content p-4 md:p-8">
        <div class="max-w-7xl mx-auto">
            <nav class="mb-6 flex justify-end">
                <button onclick="toggleLang2()" class="px-4 py-2 rounded-xl bg-slate-800 border border-slate-700 text-xs font-black hover:bg-slate-700 uppercase tracking-widest">BM / EN</button>
            </nav>
            <header class="mb-10">
                <h1 class="text-5xl font-black tracking-tighter text-blue-500 uppercase"><span data-key="title-1">ACTIVATION</span> <span class="text-white" data-key="title-2">VOLTAGE</span></h1>
                <p class="text-slate-400 font-bold tracking-[0.2em] mt-2 text-sm" data-key="subtitle">METHOD: Vac = (h/e)f - Φ/e</p>
            </header>
            <div class="grid lg:grid-cols-12 gap-6">
                <div class="lg:col-span-4 space-y-6">
                    <div class="glass p-6 rounded-[2rem] border-l-4 border-blue-500">
                        <div class="mb-4">
                            <h3 class="text-[10px] font-black text-slate-500 uppercase mb-3 tracking-widest" data-key="step-1">1. Select LED Source</h3>
                            <div class="grid grid-cols-5 gap-2" id="led-selector2"></div>
                        </div>

                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <div class="bg-black/40 h-36 rounded-xl relative overflow-hidden flex flex-col items-center justify-center border border-slate-700">
                                <div id="led-physical2" class="w-10 h-14 rounded-t-full rounded-b-lg border-2 border-slate-700 bg-slate-800/50 relative mb-2" style="--glow-color: transparent"></div>
                                <div id="glow-status2" class="text-[8px] font-black px-2 py-1 rounded bg-slate-900 text-slate-600 border border-slate-800 uppercase" data-key="status-off">LED: Off</div>
                            </div>
                            <div class="bg-black/60 h-36 rounded-xl border border-slate-800 p-1">
                                <canvas id="liveTraceChart2"></canvas>
                            </div>
                        </div>

                        <div class="space-y-4 mb-6">
                            <div class="flex justify-between items-end"><h3 class="text-[10px] font-black text-slate-500 uppercase tracking-widest" data-key="step-2">2. Find Threshold</h3><span id="volt-display2" class="text-2xl font-black mono text-blue-400">0.00V</span></div>
                            <input type="range" id="volt-slider2" min="0" max="4" step="0.01" value="0" oninput="runPhysics2()">
                        </div>
                        <div class="flex gap-2">
                            <button onclick="logPoint2()" class="flex-grow bg-white text-black py-4 rounded-xl font-black uppercase text-xs tracking-widest" data-key="btn-log">Log Point</button>
                            <button onclick="resetLab2()" class="px-4 border-2 border-red-900/50 text-red-500 rounded-xl font-black">✕</button>
                        </div>
                    </div>
                    <div class="glass p-5 rounded-2xl border-l-4 border-l-emerald-500">
                        <h3 class="text-[10px] font-black text-slate-400 uppercase mb-3" data-key="const-title">Constants</h3>
                        <div class="grid grid-cols-2 gap-4">
                            <div><p class="text-[9px] text-slate-500 uppercase font-bold" data-key="lbl-grad">Grad (h/e)</p><p id="res-gradient2" class="text-lg font-black mono">0.0000</p></div>
                            <div><p class="text-[9px] text-slate-500 uppercase font-bold" data-key="lbl-h">h (Js)</p><p id="res-h2" class="text-lg font-black mono text-emerald-400">0.00</p></div>
                        </div>
                    </div>
                </div>
                <div class="lg:col-span-8 space-y-6">
                    <div class="glass p-6 rounded-[2rem] h-[550px] relative"><canvas id="analysisChart2"></canvas></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function showLab(num) {
            document.querySelectorAll('.tab-content').forEach(lab => lab.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('lab' + num).classList.add('active');
            document.getElementById('btn-nav-' + num).classList.add('active');
        }

        Chart.defaults.color = '#94a3b8';
        Chart.defaults.borderColor = 'rgba(255,255,255,0.05)';

        // --- LAB 1: SATURATION LOGIC ---
        let currentLang1 = 'en';
        const dict1 = {
            en: { t1: "SATURATION", t2: "VOLTAGE", sub: "METHOD: Vo = (h/e)f - Φ/e", target: "Target Value", m1: "Source Vin", m3: "Solar Vo", log: "Capture Vo", adj: "Adjust Brightness", h: "Result: h =", ready: "Ready for data input..." },
            ms: { t1: "VOLTAN", t2: "KETEPUAN", sub: "KAEDAH: Vo = (h/e)f - Φ/e", target: "Nilai Sasaran", m1: "Punca Vin", m3: "Solar Vo", log: "Rekod Titik Vo", adj: "Laraskan Kecerahan", h: "Keputusan: h =", ready: "Sedia untuk data..." }
        };

        function toggleLang1() {
            currentLang1 = (currentLang1 === 'en' ? 'ms' : 'en');
            let d = dict1[currentLang1];
            document.getElementById('title1-p1').innerText = d.t1;
            document.getElementById('title1-p2').innerText = d.t2;
            document.getElementById('subtitle1').innerText = d.sub;
            document.getElementById('logBtn1').innerText = d.log;
            document.getElementById('adj-lbl-1').innerText = d.adj;
            updateAnalysis1();
        }

        let activeLED1 = { name: 'None', wave: 0, color: '#111' };
        let points1 = [];
        const ledDatasets1 = { 'UV': { color: '#a855f7', data: [] }, 'Blue': { color: '#3b82f6', data: [] }, 'Green': { color: '#22c55e', data: [] }, 'Red': { color: '#ef4444', data: [] } };

        const liveryCtx1 = document.getElementById('liveryChart1').getContext('2d');
        const liveryChart1 = new Chart(liveryCtx1, {
            type: 'line',
            data: { datasets: Object.keys(ledDatasets1).map(key => ({ label: key, data: [], borderColor: ledDatasets1[key].color, borderWidth: 2, pointRadius: 0, fill: false, tension: 0.4 }))},
            options: { 
                responsive: true, maintainAspectRatio: false, animation: false, 
                scales: { 
                    x: { type: 'linear', min: 0, max: 1, title: { display: true, text: 'Brightness Input (A.U.)', font: { size: 10, weight: 'bold' } } }, 
                    y: { type: 'linear', min: 0, max: 3, title: { display: true, text: 'Solar Vo (V)', font: { size: 10, weight: 'bold' } } } 
                }, 
                plugins: { legend: { display: false } } 
            }
        });

        const planckCtx1 = document.getElementById('planckChart1').getContext('2d');
        const planckChart1 = new Chart(planckCtx1, {
            type: 'scatter',
            data: { datasets: [{ label: 'Data', data: [], pointRadius: 10, pointBackgroundColor: [] }, { label: 'Fit', data: [], type: 'line', borderColor: '#3b82f6', borderDash: [5, 5], pointRadius: 0 }] },
            options: { 
                responsive: true, maintainAspectRatio: false, 
                scales: { 
                    x: { type: 'linear', min: 0, max: 10, title: { display: true, text: 'Frequency (10¹⁴ Hz)', font: { size: 12, weight: 'bold' } } }, 
                    y: { type: 'linear', min: -1.5, max: 3, title: { display: true, text: 'Saturation Voltage Vo (V)', font: { size: 12, weight: 'bold' } } } 
                }, 
                plugins: { legend: { display: false } } 
            }
        });

        function selectLED1(name, wave, color) { activeLED1 = { name, wave, color }; document.getElementById('pot1').value = 0; runPhysics1(); }

        function runPhysics1() {
            if (activeLED1.name === 'None') return;
            let val = document.getElementById('pot1').value / 1000;
            let freq = 3e17 / activeLED1.wave;
            let maxVo = (6.626e-34 * freq / 1.602e-19) - 1.02;
            let vo = val > 0.01 ? maxVo * (1 - Math.exp(-val * 8)) : 0;
            document.getElementById('v-in-1').innerText = (val * 12).toFixed(2);
            document.getElementById('v-out-1').innerText = vo.toFixed(2);
            document.getElementById('perc-1').innerText = Math.round(val * 100) + "%";
            const bulb = document.getElementById('led-bulb-1');
            bulb.style.background = val > 0.01 ? activeLED1.color : '#111';
            bulb.style.boxShadow = val > 0.01 ? `0 0 ${val * 70}px ${activeLED1.color}` : 'none';
            const dsIndex = Object.keys(ledDatasets1).indexOf(activeLED1.name);
            liveryChart1.data.datasets[dsIndex].data.push({ x: val, y: vo });
            liveryChart1.data.datasets[dsIndex].data.sort((a,b) => a.x - b.x);
            liveryChart1.update('none');
        }

        function logData1() {
            if (activeLED1.name === 'None') return;
            let f = (3e17 / activeLED1.wave) / 1e14;
            let vo = parseFloat(document.getElementById('v-out-1').innerText);
            if (vo < 0.1) return;
            points1 = points1.filter(p => Math.abs(p.x - f) > 0.1);
            points1.push({ x: f, y: vo, color: activeLED1.color });
            updateAnalysis1();
        }

        function updateAnalysis1() {
            planckChart1.data.datasets[0].data = points1;
            planckChart1.data.datasets[0].pointBackgroundColor = points1.map(p => p.color);
            if (points1.length >= 2) {
                const n = points1.length;
                let sX = 0, sY = 0, sXY = 0, sX2 = 0;
                points1.forEach(p => { sX += p.x; sY += p.y; sXY += p.x * p.y; sX2 += p.x * p.x; });
                let m = (n * sXY - sX * sY) / (n * sX2 - sX * sX);
                let c = (sY - m * sX) / n;
                planckChart1.data.datasets[1].data = [{ x: 0, y: c }, { x: 10, y: m * 10 + c }];
                let h = (m * 1.602e-33);
                document.getElementById('final-result1').innerHTML = `${dict1[currentLang1].h} <b>${h.toExponential(2)}</b> J·s`;
            } else { document.getElementById('final-result1').innerText = dict1[currentLang1].ready; }
            planckChart1.update();
        }

        function resetLab1() {
            points1 = [];
            liveryChart1.data.datasets.forEach(ds => ds.data = []);
            liveryChart1.update();
            planckChart1.data.datasets[1].data = [];
            document.getElementById('v-in-1').innerText = "0.00";
            document.getElementById('v-out-1').innerText = "0.00";
            document.getElementById('perc-1').innerText = "0%";
            document.getElementById('pot1').value = 0;
            document.getElementById('led-bulb-1').style.boxShadow = "none";
            updateAnalysis1();
        }

        // --- LAB 2: ACTIVATION LOGIC ---
        const E_CHARGE2 = 1.602e-19;
        let currentLang2 = 'en';
        const langData2 = {
            en: { "title-1": "ACTIVATION", "title-2": "VOLTAGE", "subtitle": "METHOD: Vac = (h/e)f - Φ/e", "step-1": "1. Select LED", "step-2": "2. Find Threshold", "btn-log": "Log Point", "const-title": "Constants", "lbl-grad": "Grad (h/e)", "lbl-h": "h (Js)", "status-off": "LED: Off", "status-on": "LED: EMITTING" },
            bm: { "title-1": "VOLTAN", "title-2": "PENGAKTIFAN", "subtitle": "KAEDAH: Vac = (h/e)f - Φ/e", "step-1": "1. Pilih LED", "step-2": "2. Cari Ambang", "btn-log": "Log Titik", "const-title": "Pemalar", "lbl-grad": "Kecerunan (h/e)", "lbl-h": "h (Js)", "status-off": "LED: Padam", "status-on": "LED: MEMANCAR" }
        };

        const leds2 = [
            { id: 0, name: 'Red', f: 4.54, vac: 1.88, color: '#ef4444' },
            { id: 1, name: 'Orange', f: 4.96, vac: 2.05, color: '#f97316' },
            { id: 2, name: 'Yellow', f: 5.13, vac: 2.12, color: '#eab308' },
            { id: 3, name: 'Green', f: 5.36, vac: 2.22, color: '#22c55e' },
            { id: 4, name: 'Blue', f: 6.38, vac: 2.64, color: '#3b82f6' }
        ];
        
        let selectedLED2 = leds2[0], loggedPoints2 = [];

        function initLab2() {
            const container = document.getElementById('led-selector2');
            leds2.forEach(led => {
                const btn = document.createElement('button');
                btn.className = `h-10 rounded-lg border-2 transition-all flex items-center justify-center`;
                btn.style.borderColor = led.color;
                btn.innerHTML = `<div class="w-3 h-3 rounded-full" style="background:${led.color}"></div>`;
                btn.onclick = () => {
                    selectedLED2 = led;
                    document.getElementById('volt-slider2').value = 0;
                    runPhysics2();
                };
                container.appendChild(btn);
            });
        }

        const liveTraceCtx2 = document.getElementById('liveTraceChart2').getContext('2d');
        const liveTraceChart2 = new Chart(liveTraceCtx2, {
            type: 'line',
            data: { datasets: leds2.map(l => ({ 
                label: l.name, 
                data: [], 
                borderColor: l.color, 
                borderWidth: 2, 
                pointRadius: 0,
                fill: false,
                tension: 0.3
            }))},
            options: {
                responsive: true, maintainAspectRatio: false, animation: false,
                scales: { 
                    x: { type: 'linear', min: 0, max: 4, title: { display: true, text: 'Forward Voltage Vf (V)', font: { size: 9, weight: 'bold' } } }, 
                    y: { type: 'linear', min: 0, max: 50, title: { display: true, text: 'Current I (mA)', font: { size: 9, weight: 'bold' } }, ticks: { font: { size: 7 } } } 
                },
                plugins: { legend: { display: false } }
            }
        });

        const ctx2 = document.getElementById('analysisChart2').getContext('2d');
        let chart2 = new Chart(ctx2, {
            type: 'scatter',
            data: { datasets: [
                { label: 'Logged', data: [], pointRadius: 10, pointBackgroundColor: [] }, 
                { label: 'Linear Law', data: [], type: 'line', borderColor: '#3b82f6', borderWidth: 2, pointRadius: 0, borderDash: [5,5] }
            ]},
            options: { 
                responsive: true, maintainAspectRatio: false, 
                scales: { 
                    x: { type: 'linear', min: 0, max: 7, title: { display: true, text: 'Frequency (10¹⁴ Hz)', font: { size: 12, weight: 'bold' }, color: '#94a3b8' } }, 
                    y: { type: 'linear', min: -1, max: 4, title: { display: true, text: 'Activation Voltage Vac (V)', font: { size: 12, weight: 'bold' }, color: '#94a3b8' } } 
                },
                plugins: { legend: { display: false } }
            }
        });

        function runPhysics2() {
            const vInput = parseFloat(document.getElementById('volt-slider2').value);
            document.getElementById('volt-display2').innerText = vInput.toFixed(2) + 'V';
            const idx = selectedLED2.id;
            const curveData = [];
            for (let v = 0; v <= vInput; v += 0.05) {
                let current = v > (selectedLED2.vac - 0.3) ? 2 * Math.exp((v - selectedLED2.vac + 0.3) * 5) : 0;
                curveData.push({x: v, y: Math.min(current, 50)});
            }
            liveTraceChart2.data.datasets.forEach((ds, i) => {
                ds.data = (i === idx) ? curveData : ds.data;
            });
            liveTraceChart2.update('none');
            const physical = document.getElementById('led-physical2');
            const status = document.getElementById('glow-status2');
            if (vInput >= selectedLED2.vac) {
                physical.style.background = selectedLED2.color;
                physical.style.boxShadow = `0 0 30px ${selectedLED2.color}`;
                status.innerText = langData2[currentLang2]["status-on"];
                status.classList.replace('text-slate-600', 'text-emerald-400');
            } else {
                physical.style.background = '#1e293b';
                physical.style.boxShadow = 'none';
                status.innerText = langData2[currentLang2]["status-off"];
                status.classList.replace('text-emerald-400', 'text-slate-600');
            }
        }

        function logPoint2() {
            const v = parseFloat(document.getElementById('volt-slider2').value);
            if (v < 0.5) return;
            loggedPoints2 = loggedPoints2.filter(p => p.id !== selectedLED2.id);
            loggedPoints2.push({ x: selectedLED2.f, y: v, id: selectedLED2.id, color: selectedLED2.color });
            updateAnalysis2();
        }

        function updateAnalysis2() {
            chart2.data.datasets[0].data = loggedPoints2;
            chart2.data.datasets[0].pointBackgroundColor = loggedPoints2.map(p => p.color);
            if (loggedPoints2.length >= 2) {
                const n = loggedPoints2.length;
                let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0;
                loggedPoints2.forEach(p => { sumX += p.x; sumY += p.y; sumXY += p.x * p.y; sumX2 += p.x * p.x; });
                const m = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
                const c = (sumY - m * sumX) / n;
                chart2.data.datasets[1].data = [{ x: 0, y: c }, { x: 7, y: m * 7 + c }];
                document.getElementById('res-gradient2').innerText = m.toFixed(4);
                document.getElementById('res-h2').innerText = (m * 1.602e-33).toExponential(2);
            }
            chart2.update();
        }

        function resetLab2() {
            loggedPoints2 = [];
            liveTraceChart2.data.datasets.forEach(d => d.data = []);
            liveTraceChart2.update();
            updateAnalysis2();
            runPhysics2();
        }

        function toggleLang2() {
            currentLang2 = currentLang2 === 'en' ? 'bm' : 'en';
            document.querySelectorAll('[data-key]').forEach(el => {
                el.innerText = langData2[currentLang2][el.getAttribute('data-key')];
            });
        }

        window.onload = () => { initLab2(); runPhysics2(); };
    </script>
